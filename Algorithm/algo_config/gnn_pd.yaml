
# base config
agent: 'MHGNN' #
project_name: "sn_MHGNN_fixedGTsPairs"

# agent hyperparameters
## model parameters

### GNN parameters
num_heads: 2
num_layers: 3
project_dim: -1
num_hidden: 24
in_drop: 0.25
attn_drop: 0.25
edge_drop: 0.1
clip: 1.0
alpha: 0.15
hop_num: 3
p_norm: 0.0
layer_norm: True
feed_forward: True
# save_path: './MAGNA-models/'
weight_decay: 1e-5
negative_slope: 0.2
self_loop: 1
head_tail_shared: 1
# random_seed: 42

pd_loss: "KL_V2" # options: "MSE", "Huber", "KL", "KL_V2"
temperature: 2.0
# start_distillation_step: 0

## training parameters

learning_rate: 0.0005
lr_decay_steps: 1000000
student_learning_rate: 0.0005
student_lr_decay_steps: 1000000
student_model: "magna" # options: "magna" or "mlp"
student_hidden_dims: [64, 64, 32]
# student_hidden_dims: [64, 32]

student_dropout: 0.0