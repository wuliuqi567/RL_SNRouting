# base config
agent: 'GAT' # GAT, MHGNN, MPNN, DDQN, MHGNNKGE
use_rl_model: true # false: shortest-path only (no RL model)
seed: 42
logger: 'tensorboard' # options: 'wandb', 'tensorboard', 'swanlab'
project_name: "satNetEnv3"
wandb_user_name: "wmqbit"
log_dir: 'logs'
model_dir: 'models' # 前面不要加 / ./ 等

device: "cuda:0"

# environment parameters
n_order_adj: 4 # number of order for adjacency matrix
action_size: 4 # number of possible actions
input_dim: 10 # dimension of input each node features

# shared RL hyperparameters (can be overridden in each algo yaml)
gamma: 0.99
learning_rate: 0.0005
end_factor: 0.1
train_epoch: 4

buffer_size: 1000000
batch_size: 128

tau: 0.01
MAX_EPSILON: 0.8
MIN_EPSILON: 0.00
LAMBDA: 0.0005
decayRate: 50

nTrain: 120
updateF: 23

w1: 50        # rewards the getting to empty queues
w2: 20        # rewards getting closes phisycally
w4: 5         # Normalization for the distance reward, for the traveled distance factor

# reward shaping modes: legacy | layer1 | layer2 | layer3
reward_mode: 'layer1'
arrive_reward: 50.0
failure_penalty: 50.0
loop_penalty: 10.0

# layer1: weaker geometry + stronger queue sensitivity + hop penalty
reward_distance_scale: 4.0
reward_distance_ref: 1.0
reward_queue_scale: 8.0
reward_queue_ref: 0.003
reward_hop_penalty: 0.3

# layer2: immediate delay cost + delay-to-go shaping
reward_prop_scale: 1.0
reward_prop_ref: 0.01
reward_tx_scale: 1.0
reward_tx_ref: 0.001
reward_delay_beta: 3.0
reward_delay_ref: 1.0
reward_remaining_queue_scale: 0.5
reward_remaining_hop_cost: 0.2

# layer3: layer2 + local congestion lookahead
reward_local_congestion_scale: 2.0
reward_local_congestion_ref: 0.01

reward_min_rate: 1000000.0
reward_cache_time_precision: 6

# training parameters
train_TA_model: true # whether to train the teacher agent network
use_student_network: false # whether to use the student network for action selection

mode_load_dir: "SimResults_new/MHGNN/2026-03-25/09-59-20_Starlink_3s_GTs_[31]_fp2_t1.60G_MS2AD800M_LACU2P800M/" # directory to load the model for evaluation or further training, should end with /
outputPath: '/home/qwer/Desktop/RL_SNRouting/intergrated_test/.mhgnn_parallel_runs/flow_1000M/./SimResults_new/GAT/2026-03-27/14-25-42_Starlink_3s_GTs_[31]_fp3_t3.00G_MS2AD1000M_LACU2P1000M_ANZ2JMN1000M/train/'
power: 3 # epsilon 衰减中的幂指数因子，默认 2，根据网关数量适当调整
CurrentGTnumber: 31
